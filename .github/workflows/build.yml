name: Build & Release

# Runs the test suite on every push and PR, and — when a version tag is
# pushed — builds the production ZIP and attaches it to a GitHub Release.
# This is what makes "production users never run Composer" real: the ZIP
# uploaded to the Release already contains an optimized vendored autoloader.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: composer test

      - name: Run PHPCS
        # PHPCS always runs and its full report is printed either way. Per
        # phpcs.xml.dist's own documented policy and scripts/validate-module-7.sh's
        # established convention: exit 1 means "violations found, reviewed
        # against the project's style baseline, not itself a build blocker"
        # (this repo carries pre-existing PHPCS debt in frozen modules that
        # predates CI ever running). Any other non-zero exit means PHPCS
        # itself failed to run (bad install, config error, crash) and that
        # DOES fail the build, same as a genuine PHPUnit or syntax failure.
        run: |
          set +e
          composer lint
          phpcs_exit=$?
          set -e
          if [ "$phpcs_exit" -eq 0 ]; then
            echo "PHPCS: clean, no findings."
          elif [ "$phpcs_exit" -eq 1 ]; then
            echo "PHPCS: findings reported above (see phpcs.xml.dist policy note) — reviewed baseline debt, not a build blocker."
          else
            echo "PHPCS itself failed to execute (exit $phpcs_exit), not just reporting violations — failing the build."
            exit 1
          fi

  build:
    name: Build release ZIP
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build production ZIP
        run: |
          chmod +x bin/build.sh
          bin/build.sh "${{ steps.version.outputs.version }}"

      - name: Attach ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-news-automator-pro-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
